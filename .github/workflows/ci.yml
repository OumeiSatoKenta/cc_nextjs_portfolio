name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm test

      - name: Audit dependencies (critical only; Static Export has no server runtime)
        run: npm audit --audit-level=critical

      - name: Build (Static Export)
        run: npm run build

      - name: Verify Static Export output
        run: |
          set -e
          test -d out
          test -d out/_next
          test -f out/404.html
          for page in index about/index projects/index blog/index contact/index; do
            test -f "out/${page}.html" || { echo "Missing: out/${page}.html"; exit 1; }
          done
